# Experiment: Connect Four Base
game:
  name: "connect_four"
  params: {}

model:
  architecture: "ConnectFourCNN"
  params:
    input_shape: [ 3, 6, 7 ]
    return_logits: true

mcts:
  # Search parameters
  num_threads: 256
  batch_size: 64
  temperature: 1.0
  c_puct: 1.0

  # Dirichlet Noise
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25

  # Iteration Schedule: [start_epoch, num_iters]
  schedule:
    - [ 0, 100 ]
    - [ 5, 400 ]
    - [ 20, 800 ]

  # Workload parameters
  num_games_per_epoch: 256

  # In-place ApplyAction/UndoAction (only for games that implement UndoAction)
  use_undo: false

  bootstrap:
    enabled: true
    num_games: 64
    num_threads: 64
    num_iters: 100
    batch_size: 32

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 64
  max_epochs: 50
  replay_buffer_size: 50000
  num_workers: 4

system:
  accelerator: "auto"
  devices: 1
  precision: "medium"
  use_fp16: false

evaluation:
  enabled: true
  interval: 2
  num_games: 10
  alphazero:
    type: "alphazero"
    engine: "python"
    mcts_iters: 100
  opponents:
    - type: "random"
    # - type: "minimax"
    #   depth: 3

