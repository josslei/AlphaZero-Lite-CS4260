# Experiment: Connect Four Base
game:
  name: "connect_four"
  params: {}

model:
  architecture: "ConnectFourCNN"
  params:
    input_shape: [ 3, 6, 7 ]
    return_logits: true

mcts:
  # Search parameters
  num_threads: 256
  batch_size: 64
  temperature: 1.0
  c_puct: 1.0

  # Dirichlet Noise
  dirichlet_alpha: 0.3
  dirichlet_epsilon: 0.25

  # Iteration Schedule: [start_epoch, num_iters]
  schedule:
    - [ 0, 100 ]
    - [ 5, 200 ]
    - [ 30, 400 ]

  # Workload parameters
  num_games_per_epoch: 256

  # In-place ApplyAction/UndoAction (only for games that implement UndoAction)
  use_undo: false

  bootstrap:
    enabled: true
    num_games: 16
    num_threads: 16
    num_iters: 10
    batch_size: 16

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 100
  replay_buffer_size: 100000
  num_workers: 4

system:
  accelerator: "auto"
  devices: 1
  precision: "medium"
  use_fp16: true

evaluation:
  # Light Tournament: runs every 'interval' epochs vs Greedy only, fully in C++
  enabled: true
  interval: 1
  num_games: 10  # configurable
  num_threads: 10  # capped to num_games automatically; no point exceeding it
  # opening_temp_moves: number of game plies where the model samples with temperature=1
  # instead of greedy argmax. Diversifies openings so repeated games are not identical.
  # Set to 0 to disable (pure greedy). Default: 2.
  opening_temp_moves: 2
  alphazero:
    type: "alphazero"
    engine: "cpp"
    mcts_iters: 200
  opponents:
    - type: "greedy"
    # Full tournament opponents (use a separate FullTournamentCallback later):
    # - type: "random"
    # - type: "minimax"
    #   depth: 3

full_tournament:
  enabled: false            # Set to true to activate
  interval: 25              # Run every N epochs
  num_games: 100            # Games per opponent (higher = more statistical confidence)
  num_threads: 100           # Worker threads (auto-capped to num_games)
  mcts_iters: 200           # MCTS iterations per AZ move (can be higher than light tournament)
  device: "cuda"            # "cuda" or "cpu" — cuda is much faster but shares GPU with training
  use_undo: false           # Must be false for Connect Four; OpenSpiel's UndoAction leaves ghost pieces
  # opening_temp_moves: number of game plies where the model samples with temperature=1
  # instead of greedy argmax. Diversifies openings so repeated games are not identical.
  # Set to 0 to disable (pure greedy). Default: 2.
  opening_temp_moves: 2
  opponents:
    - "random"
    - "greedy"
    - "minimax"             # Alpha-beta pruning, Connect Four only

