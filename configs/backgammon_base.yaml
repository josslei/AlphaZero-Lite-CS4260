# Experiment: Backgammon Base
game:
  name: "backgammon"
  params: {}

model:
  architecture: "BackgammonCNN"
  params:
    return_logits: true

mcts:
  # Search parameters
  num_threads: 128
  batch_size: 32
  temperature: 1.0
  c_puct: 1.0

  # Dirichlet Noise tailored for backgammon branching factor
  dirichlet_alpha: 0.15
  dirichlet_epsilon: 0.25

  # Iteration Schedule: [start_epoch, num_iters]
  schedule:
    - [ 0, 1 ]
    - [ 5, 50 ]
    - [ 20, 100 ]

  # Workload parameters
  num_games_per_epoch: 128

  # In-place ApplyAction/UndoAction (backgammon natively supports it perfectly for open loop states)
  use_undo: true

  bootstrap:
    enabled: true
    num_games: 32
    num_threads: 32
    num_iters: 1
    batch_size: 16

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 50
  replay_buffer_size: 500000
  num_workers: 4

system:
  accelerator: "auto"
  devices: 1
  precision: "medium"
  use_fp16: true

evaluation:
  enabled: true
  interval: 2
  num_games: 10
  alphazero:
    type: "alphazero"
    engine: "python"
    mcts_iters: 100
  opponents:
    - type: "random"

