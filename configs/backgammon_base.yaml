# Experiment: Backgammon Base
game:
  name: "backgammon"
  params: {}

model:
  architecture: "BackgammonCNN"
  params:
    return_logits: true

mcts:
  # Search parameters
  num_threads: 128
  batch_size: 32
  temperature: 1.0
  c_puct: 1.0

  # Dirichlet Noise tailored for backgammon branching factor
  dirichlet_alpha: 0.15
  dirichlet_epsilon: 0.25

  # Iteration Schedule: [start_epoch, num_iters]
  schedule:
    - [ 0, 25 ]
    - [ 5, 50 ]
    - [ 20, 100 ]

  # Workload parameters
  num_games_per_epoch: 128

  # In-place ApplyAction/UndoAction (backgammon natively supports it perfectly for open loop states)
  use_undo: true

  bootstrap:
    enabled: true
    num_games: 16
    num_threads: 16
    num_iters: 10
    batch_size: 16

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 50
  replay_buffer_size: 500000
  num_workers: 4

system:
  accelerator: "auto"
  devices: 1
  precision: "medium"
  use_fp16: true

evaluation:
  # Light Tournament: runs every 'interval' epochs vs Greedy only, fully in C++
  enabled: true
  interval: 5
  num_games: 6       # Backgammon games are ~280 moves long with a real greedy opponent;
                     # 6 games gives a meaningful win-rate signal while staying fast.
  num_threads: 6
  # opening_temp_moves: number of game plies for opening diversity
  opening_temp_moves: 2
  alphazero:
    type: "alphazero"
    engine: "cpp"
    mcts_iters: 50   # Halved from 100 — MCTS quality doesn't scale linearly with iters when
                     # the policy prior is reasonable; 50 is sufficient for evaluation.
  opponents:
    - type: "greedy"
    # Full tournament opponents:
    # - type: "random"

full_tournament:
  enabled: true             # Set to true to activate
  interval: 25              # Run every N epochs
  num_games: 100            # Games per opponent
  num_threads: 100          # Worker threads (auto-capped to num_games)
  mcts_iters: 100           # Lower iters for backgammon (larger branching factor)
  device: "cuda"            # "cuda" or "cpu"
  use_undo: true            # Crucial for performance in Backgammon
  # opening_temp_moves: number of game plies where the model samples with temperature=1
  # instead of greedy argmax. Diversifies openings so repeated games are not identical.
  opening_temp_moves: 2
  opponents:
    - "random"
    - "greedy"              # Backgammon-specific heuristic using Bar/Bear-off counts
