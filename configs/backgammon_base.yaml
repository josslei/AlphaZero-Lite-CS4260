# Experiment: Backgammon Base
game:
  name: "backgammon"
  params: {}

model:
  architecture: "BackgammonCNN"
  params:
    return_logits: true

mcts:
  # Search parameters
  num_threads: 128
  batch_size: 32
  temperature: 1.0
  c_puct: 1.0

  # Dirichlet Noise tailored for backgammon branching factor
  dirichlet_alpha: 0.15
  dirichlet_epsilon: 0.25

  # Iteration Schedule: [start_epoch, num_iters]
  schedule:
    - [ 0, 1 ]
    - [ 5, 50 ]
    - [ 20, 100 ]

  # Workload parameters
  num_games_per_epoch: 128

  # In-place ApplyAction/UndoAction (backgammon natively supports it perfectly for open loop states)
  use_undo: true

  bootstrap:
    enabled: true
    num_games: 32
    num_threads: 32
    num_iters: 1
    batch_size: 16

training:
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 256
  max_epochs: 50
  replay_buffer_size: 500000
  num_workers: 4

system:
  accelerator: "auto"
  devices: 1
  precision: "medium"
  use_fp16: true

evaluation:
  # Light Tournament: runs every 'interval' epochs vs Greedy only, fully in C++
  enabled: true
  interval: 1
  num_games: 10  # configurable
  num_threads: 10  # capped to num_games automatically; no point exceeding it
  alphazero:
    type: "alphazero"
    engine: "cpp"
    mcts_iters: 100
  opponents:
    - type: "greedy"
    # Full tournament opponents (use a separate FullTournamentCallback later):
    # - type: "random"
    # - type: "minimax"
    #   depth: 3

full_tournament:
  enabled: false            # Set to true to activate
  interval: 10              # Run every N epochs
  num_games: 100            # Games per opponent
  num_threads: 16           # Worker threads (auto-capped to num_games)
  mcts_iters: 100           # Lower iters for backgammon (larger branching factor)
  device: "cuda"            # "cuda" or "cpu"
  opponents:
    - "random"
    - "greedy"              # Backgammon-specific heuristic (stub — implement when ready)

